<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASM Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 24px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
      font-family: 'Lato', sans-serif;
    }

    .login-card {
      width: min(360px, 100%);
      background: white;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    p {
      margin: 0 0 24px;
      color: #555;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px 16px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
      margin-bottom: 16px;
      font-family: inherit;
    }

    input:focus,
    button:focus-visible {
      outline: 3px solid rgba(239, 1, 0, 0.25);
      outline-offset: 2px;
      border-color: #ef0100;
    }

    button {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      background: #111;
      color: white;
      cursor: pointer;
      font-family: inherit;
    }

    button:hover {
      opacity: 0.92;
    }

    .error {
      margin-top: 14px;
      color: #c62828;
      font-size: 14px;
      min-height: 18px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }

      .login-card {
        padding: 24px;
        border-radius: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="login-card">
    <h1>ASM Scanner</h1>
    <p>Enter password to continue</p>

    <label class="sr-only" for="passwordInput">Password</label>
    <input
      type="password"
      id="passwordInput"
      placeholder="Password"
      autocomplete="current-password"
      autofocus
      aria-describedby="errorMsg"
    >
    <button id="loginBtn" type="button">Enter</button>

    <div class="error" id="errorMsg" aria-live="polite"></div>
  </main>

  <script>
    const PASSWORD = "1234";
    const input = document.getElementById("passwordInput");
    const button = document.getElementById("loginBtn");
    const errorMsg = document.getElementById("errorMsg");

    function checkPassword() {
      if (input.value === PASSWORD) {
        window.location.href = "attendance.html";
      } else {
        errorMsg.textContent = "Incorrect password";
      }
    }

    button.addEventListener("click", checkPassword);

    input.addEventListener("input", () => {
      errorMsg.textContent = "";
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        checkPassword();
      }
    });
  </script>
</body>
</html>
